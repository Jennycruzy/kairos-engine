# KAIRÓS Engine — Nginx config
# Place at: /etc/nginx/sites-available/kairos-engine
# Then: ln -s /etc/nginx/sites-available/kairos-engine /etc/nginx/sites-enabled/
# Then: certbot --nginx -d YOUR_SUBDOMAIN.duckdns.org
# Then: nginx -s reload

server {
    listen 80;
    server_name YOUR_SUBDOMAIN.duckdns.org;

    # Certbot will add SSL config below this line automatically

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
